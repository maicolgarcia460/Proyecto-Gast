<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAST - Menú Principal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/Estilos.css">

</head>

<body class="bg-[#F5F5F5] min-h-screen flex flex-col">

  <!-- ENCABEZADO -->
  <header class="flex justify-between items-center w-full">
    <div class="bg-[#1E88E5] text-black py-10 px-6 w-[85%]">
      <h1 id="rolTitulo" class="text-3xl font-bold"></h1>
    </div>

    <div class="flex items-center space-x-8 pr-6">
      <h1 class="text-4xl font-bold">GAST</h1>
      <img src="assets/img/logo-gast.png" class="w-20 h-20 rounded-full object-cover">
    </div>
  </header>

  <!-- NAVEGACIÓN -->
  <nav class="bg-[#1E88E5]/25 w-full flex justify-between items-center">
    <div class="flex space-x-6 text-sm font-medium">
      <a id="home" href="menu_principal.html" class="text-black px-5 py-3 bg-[#f5f5f5] font-bold rounded-t-lg">Home</a>
      <a id="solicitudes" href="Registrar_solicitud.html" class="text-black py-3">Solicitudes en curso</a>
      <a id="aprobar" href="Aprobar_solicitud.html" class="text-black py-3">Solicitudes pendientes por aprobar</a>
      <a id="asignar" href="Asignar_solicitud.html" class="text-black py-3">Solicitudes pendientes por asignar</a>
      <a id="estadisticas" href="Modulo_estadisticas.html" class="text-black py-3">Estadísticas</a>
    </div>
    
    <!-- Buscador -->
    <div class="flex items-center space-x-0">
      <input type="text" placeholder="search" class="rounded px-3 py-2 text-sm focus:outline-none focus:ring focus:ring-blue-300">
      <button class="text-white hover:text-gray-200 px-5">🔍</button>
    </div>
  </nav>

  <main 
   class=" flex flex-1 px-10 py-10 justify-between">

    <!-- Tarjetas -->
    <div class="flex-5 grid grid-cols-3 gap-10 text-center">
    <a id="Tsolicitudes" href="Registrar_solicitud.html" class="block">
      <div class="bg-[#1E88E5]/25 w-85 h-60 p-8 rounded-2xl shadow hover:shadow-lg transition">
        <img src="assets/img/SP.png" alt="Solicitudes en curso" class="mx-auto w-40 h-40 mb-20" />
        <h2 class="font-semibold text-2xl">Solicitudes en curso</h2>
      </div> </a>

    <a id="Taprobar" href="Aprobar_solicitud.html" class="block">
      <div class="bg-[#1E88E5]/25 w-85 h-60 p-8 rounded-2xl shadow hover:shadow-lg transition">
        <img src="assets/img/SPA.png" class="mx-auto w-40 h-40 mb-20" />
        <h2 class="font-semibold text-2xl">Solicitudes pendientes por aprobar</h2>
      </div> </a>

    <a id="Tasignar" href="Asignar_solicitud.html" class="block">
      <div class="bg-[#1E88E5]/25 w-85 h-60 p-8 rounded-2xl shadow hover:shadow-lg transition">
        <img src="assets/img/SPA.png" class="mx-auto w-40 h-40 mb-20" />
        <h2 class="font-semibold text-2xl">Solicitudes pendientes por asignar</h2>
      </div> </a>

    <a id="Testadisticas" href="Modulo_estadisticas.html" class="block">
      <div class="bg-[#1E88E5]/25 w-85 h-60 p-8 rounded-2xl shadow hover:shadow-lg transition">
        <img src="assets/img/EST.png" class="mx-auto w-40 h-40 mb-20" />
        <h2 class="font-semibold text-2xl">Estadísticas</h2>
      </div>
    </div> </a>

    <div class="flex items-center gap-10">

    <!-- Línea divisoria -->
    <div class="h-[65vh] border-l-2 border-gray-300"></div>

    <!-- sección derecha -->
    <div class="flex flex-col items-center justify-center">
      <img src="assets/img/IMG_PLANO.png" class="rounded-2xl w-64 h-96 object-cover mb-4 shadow">
      <div class="flex space-x-2 mb-6">
        <div class="w-2 h-2 bg-gray-400 rounded-full"></div>
        <div class="w-2 h-2 bg-gray-200 rounded-full"></div>
      </div>
      <button class="bg-[#1E88E5] text-white px-5 py-2 rounded-lg font-semibold hover:bg-[#1E88E5]/50 transition absolute bottom-6 right-6 shadow-md">
      <a href="Inicio_sesion.html"> Cerrar sesión </a>
      </button>
    </div>

  </main>

  <!-- JS -->
  <script type="module" src="js/Menu_principal.js"></script>

</body>
</html>
