<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modulo estadisticas - GAST</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/Estilos.css">
</head>

<body class="bg-[#F5F5F5] min-h-screen flex flex-col">

  <!-- ENCABEZADO -->
  <header class="flex justify-between items-center w-full">
    <div class="bg-[#1E88E5] text-black py-10 px-6 w-[85%]">
      <h1 id="rolTitulo" class="text-3xl font-bold"></h1>
    </div>

    <!-- Logo-->
    <div class="flex items-center space-x-8 pr-6">
      <h1 class="text-4xl font-bold">GAST</h1>
      <img src="assets/img/logo-gast.png" class="w-20 h-20 rounded-full object-cover">
    </div>
  </header>

  <!-- BARRA DE NAVEGACIÓN -->
  <nav class="bg-[#1E88E5]/25 w-full flex justify-between items-center px-0">
    <div class="flex space-x-6 text-sm font-medium">
      <a id="home" href="Menu_principal.html" class="text-black px-5 py-3">Home</a>
      <a id="solicitudes" href="Registrar_solicitud.html" class="text-black py-3"> Solicitudes en curso</a>
      <a id="aprobar" href="Aprobar_solicitud.html" class="text-black py-3">Solicitudes pendientes por aprobar</a>
      <a id="asignar" href="Asignar_solicitud.html" class="text-black py-3">Solicitudes pendientes por asignar</a>
      <a id="estadisticas" href="Modulo_estadisticas.html" class="text-[black] bg-[#f5f5f5] font-bold px-5 py-3 rounded-t-lg"> Estadísticas </a>
    </div>

    <!-- Buscador -->
    <div class="flex items-center space-x-0">
      <input type="text" placeholder="search" class="rounded px-3 py-2 text-sm focus:outline-none focus:ring focus:ring-blue-300">
      <button class="text-white hover:text-gray-200 px-5">🔍</button>
    </div>
  </nav>

  <main class="flex-1 px-12 py-6 relative">

    <!-- Título -->
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-2xl font-bold">Estadísticas</h2>
    </div>

  <!-- Contenedor principal -->
  <section class="bg-[#C2C2C2]/25 border-4 border-black rounded-2xl p-6">
      <div class="grid grid-cols-3 gap-6 justify-items-center">

        <!-- Gráficos -->
        <div data-soporte="Tarj1" class="bg-white p-5 rounded-xl shadow-md border cursor-pointer hover:scale-105 transition">
          <h2 class="font-bold mb-3 text-center text-black text-1xl">Estados de solicitudes</h2>
          <canvas id="graficoPastel" width="300" height="200"></canvas>
        </div>

        <div data-soporte="Tarj2" class="bg-white p-5 rounded-xl shadow-md border cursor-pointer hover:scale-105 transition">
          <h2 class="font-bold mb-3 text-center text-black text-1xl">Promedio de entregas</h2>
          <canvas id="graficoBarras" width="300" height="200"></canvas>
        </div>

        <div data-soporte="Tarj3" class="bg-white p-5 rounded-xl shadow-md border cursor-pointer hover:scale-105 transition">
          <h2 class="font-bold mb-3 text-center text-black text-1xl">Solicitudes completadas por año</h2>
          <canvas id="graficoLineas" width="400" height="200"></canvas>
        </div>
      </div>

      <!-- contenedor de reporte -->
      <div id="tarjetaSoporte" class="hidden bg-[#1E88E5]/25 border-2 border-[#1E88E5] rounded-xl p-4 text-center shadow-md mt-10 w-60 mx-auto h-fit">
        <h3 class="text-2xl font-bold text-black mb-3">Generar soporte:</h3>
        <div class="text-left ml-6 text-black">
          <label class="block mb-1">
            <input type="radio" name="formato" checked> <b>PDF</b> </label>
          <label class="block mb-3">
            <input type="radio" name="formato"> <b>Excel</b> </label>
        </div>
        <button class="bg-white px-5 py-2 rounded-xl shadow font-bold hover:bg-gray-100"> <a href="Mensaje_proceso_exitoso.html"> Confirmar </a> </button>
      </div>
    </div>
  </section>

  <script type="module" src="js/Modulo_estadisticas.js"></script>

</main>
</body>
</html>
