<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asignar Solicitudes - GAST</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/Estilos.css">
</head>

<body class="bg-[#F5F5F5] min-h-screen flex flex-col">

  <!-- Encabezado -->
  <header class="flex justify-between items-center w-full">
    <div class="bg-[#1E88E5] text-black py-10 px-6 w-[85%]">
      <h1 id="rolTitulo" class="text-3xl font-bold"></h1>
    </div>

    <!-- Logo -->
    <div class="flex items-center space-x-8 pr-6">
      <h1 class="text-4xl font-bold">GAST</h1>
      <img src="assets/img/logo-gast.png" class="w-20 h-20 rounded-full object-cover">
    </div>
  </header>

  <!-- Barra de navegación -->
  <nav class="bg-[#1E88E5]/25 w-full flex justify-between items-center px-0">
    <div class="flex space-x-6 text-sm font-medium">
      <a id="home" href="Menu_principal.html" class="text-black px-5 py-3">Home</a>
      <a id="solicitudes" href="Registrar_solicitud.html" class="text-black py-3"> Solicitudes en curso</a>
      <a id="aprobar" href="Aprobar_solicitud.html" class="text-black py-3">Solicitudes pendientes por aprobar</a>
      <a id="asignar" href="Asignar_solicitud.html" class="text-[black] bg-[#f5f5f5] font-bold px-5 py-3 rounded-t-lg">Solicitudes pendientes por asignar</a>
      <a id="estadisticas" href="Modulo_estadisticas.html" class="text-black py-3"> Estadísticas </a>
    </div>

  <!-- Buscador -->
    <div class="flex items-center space-x-0">
      <input type="text" id="inputBuscar" placeholder="search" class="rounded px-3 py-2 text-sm focus:outline-none focus:ring focus:ring-blue-300">
      <button id="btnBuscar" class="text-white hover:text-gray-200 px-5">🔍</button>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="flex-1 px-12 py-6 relative">

    <!-- Título -->
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold">Solicitudes pendientes por asignar</h2>
      <div class="flex gap-6 mt-2 text-sm text-gray-600"></div>
    </div>

    <!-- Contenedor listado de solicitudes -->
    <section class="bg-[#C2C2C2]/25 border-4 border-black rounded-2xl p-6">
      <div id="listaSolicitudes" class="space-y-4"></div>
        
    <!-- Plantilla de tarjeta -->
      <template id="templateSolicitud">
        <div class="flex justify-between items-center bg-[#1E88E5]/30 px-4 py-3 rounded-2xl">
          <span class="font-bold nombreSolicitud"></span>
          <button class="btnAsignar1 bg-[#E5E5E5] border-2 border-[#1E88E5] px-2 py-1 rounded-lg text-[#1E88E5] font-bold"> Asignar </button>
        </div>
      </template>
    </section>

    <!-- Panel de solicitud -->
    <div id="panelDetalle" class="absolute top-40 right-[200px] w-[40%] bg-[#BFD3E6] border-4 border-black rounded-2xl p-6 shadow-md hidden">
      <button data-cerrar="panelDetalle" class="absolute top-3 right-4 text-black hover:text-red-600 text-2xl font-bold">&times;</button>
      <h2 id="tituloSolicitud" class="font-bold text-2xl text-black mb-4"></h2>
      <div class="bg-gray-200 w-full rounded-2xl border-2 border-black shadow-md p-5 text-left space-y-2">
        <div id="infoSolicitudAsignar" class="text-black text-sm space-y-1"></div>
      </div>
      

    <!-- Lista de colaboradores -->
      <p class="font-bold text-xl text-center mb-4 mt-4">colaboradores:</p>
      <div id="listaColaboradores" class="bg-gray-200 text-sm p-4 border-2 border-black rounded-2xl space-y-2"></div>

    <!-- Listado de prioridades -->  
      <div class="mt-5">
        <p class="font-bold text-xl text-center mb-5">Prioridad:</p>
        <div class="flex justify-center gap-3">
          <button type="button" data-prioridad="Alta" class="btnPrioridad font-bold bg-red-500 text-black px-3 py-1 rounded text-sm"> 1-Alta </button>
          <button type="button" data-prioridad="Media" class="btnPrioridad font-bold bg-yellow-400 text-black px-3 py-1 rounded text-sm"> 2-Media </button>
          <button type="button" data-prioridad="Baja" class="btnPrioridad font-bold bg-green-500 text-black px-3 py-1 rounded text-sm"> 3-Baja </button>
        </div>

    <!-- Observaciones -->    
        <label class="font-bold text-black block mb-1 text-sm">Observaciones:</label>
        <textarea id="observaciones" class="bg-white rounded-md border border-black w-full h-[55px] mb-3"></textarea>

    <!-- Botón de asignar -->
        <div class="flex justify-center mt-2">
          <button id="btnAsignar2" class="mt-4 bg-white border-2 border-black px-6 py-2 rounded-xl shadow font-bold hover:bg-[#1E88E5]/30 transition text-base"> Asignar </button>
        </div>
      </div>
    </div>

<script type="module" src="js/Asignar_solicitud.js"></script>
</body>
</html>
