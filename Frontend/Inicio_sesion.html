<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAST - Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css\Estilos.css">
</head>

<body class="min-h-screen flex flex-col">

  <!-- Barra superior -->
  <nav class="text-[20px] flex bg-white text-black font-semibold">
    <button id="solicitante" 
      class="bg-[#1E88E5] text-black font-bold px-3 py-2 rounded-t-md"> Solicitante
    </button>
    <button id="jefe"
      class="font-bold px-3 py-2 rounded-t-md"> Jefe de área
    </button>
    <button id="colaborador"
      class="font-bold px-3 py-2 rounded-t-md"> Colaborador
    </button>
  </nav>

  <!-- Franja azul -->
  <div class="w-full bg-[#1E88E5] flex items-center justify-center m-0 p-0">
    <h1 class="text-[90px] font-bold text-black ml-[600px] md:mt-20">GAST</h1>
  </div>

  <!-- Contenedor principal -->
  <main 
  class="flex flex-col md:flex-row justify-center items-center flex-grow mt-0 px-6 w-full max-w-6xl mx-auto">

    <!-- Formulario -->
    <div class="bg-[#F5F5F5] border-4 border-black rounded-2xl p-8 w-full md:w-1/2 max-w-sm text-center shadow-md">
      <h2 class="text-3xl font-bold mb-6 text-gray-600">Iniciar Sesión</h2>

      <form id="formLogin" class="space-y-5">
        <div class="text-left">
          <label class="block text-lg text-gray-700 mb-1">Usuario:</label>
          <input id="usuario" type="text" required class="w-full border-2 border-gray-400 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-[#1E88E5]" />
        </div>
        <div class="text-left">
          <label class="block text-lg text-gray-700 mb-1">Contraseña:</label>
          <input id="password" type="password" required class="w-full border-2 border-gray-400 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-[#1E88E5]" />
        </div>
        <p id="mensajeError" class="hidden text-red-600 text-sm"></p>
        <button type="submit"
          class="w-full bg-[#1E88E5] text-white font-semibold py-2 rounded-md hover:bg-blue-600 transition duration-200"> Ingresar
        </button>
        <a href="#" class="text-sm text-[#1E88E5] hover:underline block mt-2">
          ¿Olvidaste la contraseña?
        </a>
      </form>
    </div>

    <!-- Línea divisoria -->
    <div class="h-[65vh] border-l-4 border-gray-300 ml-[150px] mr-[70px]"></div>

    <!-- Logo -->
    <div class="w-full md:w-1/2">
      <img src="assets\img\logo-gast.png" alt="Logo GAST" class="w-85 h-85 object-contain">
    </div>

  </main>

  <!-- JS Login -->
  <script type="module" src="js/Inicio_sesion.js"></script>

</body>
</html>
